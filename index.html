<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz dia dos Namorados</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Nunito:wght@400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body {
  min-height:100vh;
  background: radial-gradient(ellipse at 50% 30%, #fffde7 0%, #fef9c3 50%, #fff0f6 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Nunito',sans-serif;
  padding:20px;
  overflow-x:hidden;
}

.petal {
  position:fixed;pointer-events:none;opacity:0;
  animation:fall linear infinite;z-index:0;
}
@keyframes fall {
  0%{opacity:0;transform:translateY(-40px) rotate(0deg);}
  10%{opacity:.55;}90%{opacity:.35;}
  100%{opacity:0;transform:translateY(108vh) rotate(400deg);}
}


/* === FLIP === */
.scene {
  width:340px;height:660px;
  perspective:1400px;
  z-index:1;cursor:pointer;
}
.card-flip {
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s cubic-bezier(.4,0,.2,1);
}
.card-flip.flipped { transform:rotateY(180deg); }

.face {
  position:absolute;inset:0;
  border-radius:30px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
  box-shadow:0 16px 50px rgba(200,155,0,.18),0 4px 18px rgba(0,0,0,.09);
}

/* FRONT */
.front {
  background: linear-gradient(170deg,#fffde7 0%,#fffbcc 55%,#fef9c3 100%);
  border:2px solid #fde68a;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:24px;
}

/* BACK */

/* verso novo */
.back {
  background: linear-gradient(160deg,#fff0f9 0%,#fdf4ff 50%,#fffbe6 100%);
  border:2px solid #f9a8d4;
  transform:rotateY(180deg);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:20px 22px 16px;
  overflow:hidden;
}
.back-cat-top {
  width:110px;
  image-rendering:pixelated;
  margin-bottom:6px;
  animation:catFloat 3s ease-in-out infinite;
}
@keyframes catFloat {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}
.back-name-badge {
  background: linear-gradient(135deg,#fef9c3,#fde68a);
  border:1.5px solid #fcd34d;
  border-radius:50px;
  padding:5px 22px;
  font-family:'Playfair Display',serif;
  font-size:1.2rem;
  font-weight:600;
  color:#92400e;
  margin-bottom:12px;
  letter-spacing:.03em;
}
.back-msg-box {
  background:rgba(255,255,255,.7);
  border:1.5px dashed #f9a8d4;
  border-radius:16px;
  padding:14px 16px 10px;
  width:100%;
  margin-bottom:10px;
  position:relative;
  overflow:visible;
}
.back-quote-open {
  font-size:2.2rem;color:#f9a8d4;font-family:Georgia,serif;
  line-height:.3;display:block;margin-bottom:6px;
}
.back-quote-close {
  font-size:2.2rem;color:#f9a8d4;font-family:Georgia,serif;
  line-height:.3;display:block;text-align:right;margin-top:4px;
}
.back-textarea {
  width:100%;background:transparent;border:none;outline:none;resize:none;
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:.88rem;color:#831843;line-height:1.85;text-align:left;
  min-height:170px;cursor:default;overflow-y:auto;
}
.back-signature {
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:.95rem;
  color:#9d174d;
  margin-top:10px;
  margin-bottom:6px;
  letter-spacing:.02em;
}
.back-cat-bottom {
  width:95px;
  image-rendering:pixelated;
  animation:catFloat 3.5s ease-in-out infinite;
  animation-delay:.5s;
  margin-top:4px;
  margin-bottom:6px;
}
.spotify-btn {
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.75);
  border:1.5px solid #f9a8d4;
  border-radius:50px;
  padding:7px 16px;
  text-decoration:none;
  cursor:pointer;
  width:100%;
  transition:background .2s;
}
.spotify-btn:hover { background:rgba(255,255,255,.95); }
.spotify-icon {
  width:28px;height:28px;flex-shrink:0;
}
.spotify-text {
  display:flex;flex-direction:column;
}
.spotify-label {
  font-size:.65rem;font-weight:700;color:#9d174d;
  letter-spacing:.06em;text-transform:uppercase;
}
.spotify-song {
  font-size:.75rem;color:#831843;
  font-family:'Playfair Display',serif;font-style:italic;
}


/* bouquet */
.bouquet-scene {
  position:absolute;top:0;left:0;right:0;bottom:100px;
  display:flex;align-items:flex-end;justify-content:center;
  overflow:hidden;
}
.bouquet-svg {
  animation:sway 4s ease-in-out infinite;
  transform-origin:50% 100%;
  filter:drop-shadow(0 14px 22px rgba(180,140,0,.15));
  margin-bottom:-14px;
}
@keyframes sway{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);}}

/* sparkles */
.spark {
  position:absolute;border-radius:50%;
  animation:sparkle 2.8s ease-in-out infinite;
  pointer-events:none;
}
@keyframes sparkle{
  0%,100%{opacity:0;transform:scale(0) rotate(0deg);}
  45%{opacity:1;transform:scale(1.5) rotate(180deg);}
  75%{opacity:.5;transform:scale(1) rotate(270deg);}
}

.tap-hint {
  font-size:.7rem;color:#92400e;font-weight:700;
  letter-spacing:.09em;text-transform:uppercase;opacity:.65;
  position:absolute;bottom:20px;left:0;right:0;text-align:center;z-index:2;
}

/* BACK */

.edit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(236,72,153,.42);}



/* confetti */
.confetti-piece{
  position:fixed;pointer-events:none;z-index:999;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1);}
  100%{opacity:0;transform:translateY(320px) rotate(800deg) scale(.4);}
}

/* bolinhas piscando no verso */
.bubbles {
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  border-radius:30px;
  z-index:0;
}
.bubble {
  position:absolute;
  border-radius:50%;
  animation:bubblePulse ease-in-out infinite;
  opacity:0;
}
@keyframes bubblePulse {
  0%,100%{opacity:0;transform:scale(.7);}
  50%{opacity:1;transform:scale(1);}
}
.back > *:not(.bubbles) { position:relative;z-index:1; }

/* frase topo */
.front-title {
  position:absolute;top:150px;left:0;right:0;
  text-align:center;z-index:3;
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:1.3rem;
  color:#92400e;
  letter-spacing:.04em;
  opacity:.9;
}

/* borboletas */
.butterfly {
  position:absolute;
  pointer-events:none;
  z-index:3;
  animation:butterflyFly ease-in-out infinite;
  transform-origin:center;
}
@keyframes butterflyFly {
  0%   { transform: translate(0,0) rotate(-8deg) scaleX(1); }
  25%  { transform: translate(12px,-14px) rotate(5deg) scaleX(-1); }
  50%  { transform: translate(24px,-6px) rotate(-5deg) scaleX(1); }
  75%  { transform: translate(10px,-18px) rotate(8deg) scaleX(-1); }
  100% { transform: translate(0,0) rotate(-8deg) scaleX(1); }
}

/* florezinhas subindo do buquê */
.rising-flower {
  position:absolute;
  pointer-events:none;
  z-index:3;
  animation:riseUp ease-in-out infinite;
  opacity:0;
}
@keyframes riseUp {
  0%   { opacity:0; transform:translateY(0) rotate(0deg) scale(.6); }
  15%  { opacity:.9; }
  80%  { opacity:.5; transform:translateY(-90px) rotate(40deg) scale(1); }
  100% { opacity:0; transform:translateY(-110px) rotate(60deg) scale(.8); }
}
</style>
</head>

<script>
let flipped=false;

function flipCard(){
  flipped=!flipped;
  document.getElementById('cardFlip').classList.toggle('flipped',flipped);
  if(flipped) burstConfetti();
}

function burstConfetti(){
  const colors=['#facc15','#f9a8d4','#fb923c','#a5f3fc','#86efac','#fde047','#fff'];
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(let i=0;i<25;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    const angle=Math.random()*360;
    const dist=50+Math.random()*200;
    const x=cx+Math.cos(angle*Math.PI/180)*dist-4;
    const y=cy+Math.sin(angle*Math.PI/180)*dist-4;
    const size=4+Math.random()*8;
    c.style.cssText=`left:${x}px;top:${y}px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${size}px;height:${size}px;border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${.7+Math.random()*.9}s;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1800);
  }
}

const emojis=['🌸','🌼','🌻'];
for(let i=0;i<22;i++){
  const p=document.createElement('div');
  p.className='petal';
  p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  p.style.left=Math.random()*100+'vw';
  p.style.fontSize=(0.7+Math.random()*.9)+'rem';
  p.style.animationDuration=(7+Math.random()*9)+'s';
  p.style.animationDelay=(Math.random()*10)+'s';
  document.body.appendChild(p);
}

(function(){
  const wrap=document.getElementById('bubbles');
  if(!wrap) return;
  const colors=['#facc15','#f9a8d4','#fde047','#fecdd3','#fef08a','#ffffff','#f472b6'];
  for(let i=0;i<18;i++){
    const b=document.createElement('div');
    b.className='bubble';
    const size=6+Math.random()*18;
    b.style.cssText=`width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*92}%;top:${Math.random()*92}%;animation-duration:${1.8+Math.random()*2.5}s;animation-delay:${Math.random()*3}s;opacity:0;`;
    wrap.appendChild(b);
  }
})();
</script>
